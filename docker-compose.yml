version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stock_prediction_db
    environment:
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpassword
      POSTGRES_DB: stock_prediction
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: stock_prediction_backend
    environment:
      DATABASE_URL: postgresql://stockuser:stockpassword@postgres:5432/stock_prediction
      SECRET_KEY: your-secret-key-change-in-production
      MODEL_DIR: ./models
      NEWS_API_KEY: ${NEWS_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml_model/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: stock_prediction_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: stock_prediction_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: stock_prediction_network
